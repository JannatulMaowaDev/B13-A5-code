<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>
   <!-- fonts  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <!-- icon  -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- daisy ui -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- stylesheet  -->
  <style>
    * {
      font-family: "Geist", sans-serif;
    }

    .line-clamp-2 {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>

<body class="bg-[#F8FAFC]">
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="w-11/12 mx-auto flex items-center justify-between py-3 gap-3">
      <a href="" class="flex items-center gap-2 shrink-0">
        <img class="w-6 h-6" src="assets/github-logo.png" alt="GitHub Logo">
        <span class="text-base font-bold hidden sm:block whitespace-nowrap">GitHub Issues Tracker</span>
      </a>
      <div class="flex items-center gap-2 flex-1 justify-end">
        <label class="flex items-center gap-2 flex-1 sm:flex-none sm:w-64 md:w-80
                      border border-gray-200 rounded-lg px-3 py-1.5 bg-gray-50
                      focus-within:border-indigo-400 focus-within:bg-white transition cursor-text">
          <svg class="h-[1em] opacity-50 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </g>
          </svg>
          <input id="search-input" type="search" placeholder="Search issues..."
            class="flex-1 bg-transparent outline-none text-sm min-w-0 border-none" />
        </label>
        <button onclick="handleSearch(
          document.getElementById('search-input').value.trim()
        )"  
        class="btn btn-primary btn-sm flex gap-1 shrink-0">
          <i class="fa-solid fa-magnifying-glass"></i>
          <span class="hidden sm:inline">Search</span>
        </button>
        <a href="" class="btn btn-primary btn-sm hidden lg:flex gap-1">
          <i class="fa-solid fa-plus"></i>New Issue
        </a>
      </div>
    </div>
  </header>

 <!-- FILTER BUTTON -->
  <section class="w-11/12 mx-auto mt-6">
    <div class="bg-white shadow-sm rounded-xl px-5 py-4 flex flex-col sm:flex-row gap-2">
      <button id="btn-all" onclick="filterCards('all')"  class="filter-btn btn btn-primary btn-md w-full sm:w-28">All</button>
      <button id="btn-open" onclick="filterCards('open')"  class="filter-btn btn btn-primary btn-md w-full sm:w-28">Open</button>
      <button id="btn-closed" onclick="filterCards('closed')"  class="filter-btn btn btn-primary btn-md w-full sm:w-28">Closed</button>
    </div>
  </section>

   <!--  ISSUES HEADER -->
  <section class="w-11/12 mx-auto mt-4">
    <div class="bg-white shadow-sm rounded-xl px-4 py-4 sm:px-6 sm:py-5
                flex items-center justify-between gap-4 flex-wrap">

      <!-- Left -->
      <div class="flex items-center gap-3 sm:gap-3.5">
        <div class="w-10 h-10 sm:w-12 sm:h-12
         rounded-xl flex items-center justify-center flex-shrink-0">
          <img src="assets/Aperture.png" alt="">
        </div>
        <div>
          <h2 id="issue-count" class="text-lg sm:text-[22px] font-bold">0 Issues</h2>
          <p class="text-[12px] sm:text-[13px] text-gray-500 mt-0.5">Track and manage your project issues</p>
        </div>
      </div>

      <!-- Right : legend -->
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-2">
          <div class="w-3 h-3 bg-green-500 rounded-full"></div>
          <span class="text-[12px] sm:text-[13px] text-gray-500">Open</span>
        </div>
        <div class="flex items-center gap-2">
          <div class="w-3 h-3 bg-purple-500 rounded-full"></div>
          <span class="text-[12px] sm:text-[13px] text-gray-500">Closed</span>
        </div>
      </div>
    </div>
  </section>
<!-- CARDS -->
  <section id="cards-container" class="w-11/12 mx-auto mt-4 gap-4 shadow-sm rounded-xl
   grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 p-4">
    <!-- card's placeholder -->
  </section>
  <!-- MODAL -->
   <div id="card-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4"
    style="background: rgba(0,0,0,0.4);">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-auto relative max-h-[90vh] overflow-y-auto">
      <div class="p-6 pb-3">
        <h2 id="modal-title" class="text-lg font-bold leading-snug pr-8"></h2>
        <div class="flex items-center gap-2 mt-2 flex-wrap">
          <span id="modal-status-badge"></span>
          <span id="modal-meta" class="text-xs text-gray-400"></span>
        </div>
      </div>
      <div class="px-6 pb-3">
        <div id="modal-labels" class="flex flex-wrap gap-1.5">
        </div>
      </div>
      <div class="px-6 pb-4">
        <p id="modal-desc" class="text-sm text-gray-600 leading-relaxed"></p>
      </div>
      <div class="mx-6 mb-6 grid grid-cols-2 gap-4 bg-gray-50 rounded-xl p-4">
        <div>
          <p class="text-xs text-gray-400 mb-1">Assignee:</p>
          <p id="modal-assignee" class="text-sm font-semibold"></p>
        </div>
        <div>
          <p class="text-xs text-gray-400 mb-1">Priority:</p><span id="modal-priority"
            class="text-xs font-bold px-3 py-1 rounded-full"></span>
        </div>
      </div>
       <div class="px-6 pb-6 flex justify-end"><button onclick="closeModal()"
          class="btn btn-primary btn-sm px-6">Close</button></div>
    </div>
  </div>

  <script src="script/script.js"></script>
</body>
</html>
